name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Validate tracked package files
        run: |
          python3 - <<'PY'
          import pathlib, subprocess, sys
          root = pathlib.Path('.')
          tracked = subprocess.check_output(['git', 'ls-files', '-z'], text=True).split('\0')
          errors = []
          for rel in filter(None, tracked):
              if rel.endswith('.gitkeep'):
                  continue
              path = root / rel
              if rel.endswith(('.new', '.tmp', '.bak', '.orig')):
                  errors.append(f"tracked temp file: {rel}")
              if path.is_file() and path.stat().st_size == 0:
                  errors.append(f"empty tracked file: {rel}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Verify build
        run: |
          go vet ./...
          echo "Build successful!"
